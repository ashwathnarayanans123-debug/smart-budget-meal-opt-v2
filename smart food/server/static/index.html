<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meal Advisor | Bulletproof v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: #111827; --hunger: #ef4444; --budget: #facc15; --health: #10b981; --accent: #8b5cf6; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden;}
        .sidebar { width: 320px; background: #0f172a; padding: 25px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 20px;}
        .stat-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 5px;}
        .stat-val { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .bar { height: 6px; background: rgba(0,0,0,0.4); border-radius: 3px; overflow: hidden;}
        .bar-fill { height: 100%; width: 0%; transition: width 0.8s ease; }
        .chat-main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .chat-header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
        #chat-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px;}
        .bot { align-self: flex-start; background: #1e293b; color: #cbd5e1; border-bottom-left-radius: 2px;}
        .input-area { padding: 25px; background: #030712; display: flex; flex-direction: column; gap: 15px;}
        input { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 30px; color: white; font-size: 1rem; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 0 30px; border-radius: 30px; cursor: pointer; font-weight: 800; }
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="font-size: 3rem;">TASK ENDED</h2>
        <p id="summary" style="opacity: 0.6; margin: 20px 0; font-size: 1.2rem;"></p>
        <button onclick="location.reload()" class="send-btn" style="padding: 15px 40px;">NEW SIMULATION</button>
    </div>

    <div class="sidebar">
        <div style="text-align: center;"><span style="font-size: 3rem;">🥗</span></div>
        <div class="stat-box">
            <div class="stat-label">Hunger Level</div>
            <div class="stat-val color-hunger" id="v-hunger">10</div>
            <div class="bar"><div class="bar-fill bg-hunger" id="b-hunger"></div></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Budget Remaining</div>
            <div class="stat-val color-budget" id="v-budget">$100</div>
            <div class="bar"><div class="bar-fill bg-budget" id="b-budget"></div></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Health Score</div>
            <div class="stat-val color-health" id="v-health">10</div>
            <div class="bar"><div class="bar-fill bg-health" id="b-health"></div></div>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header"><h1>AI MEAL ADVISOR</h1></div>
        <div id="chat-container">
            <div class="bubble bot">Welcome back. I am your Smart Meal Advisor. What are we eating today?</div>
        </div>
        <div class="input-area">
            <div class="chips">
                <div class="chip" onclick="handleAction('burger')">🍔 Burger ($30)</div>
                <div class="chip" onclick="handleAction('salad')">🥗 Salad ($20)</div>
                <div class="chip" onclick="handleAction('rice')">🍚 Rice ($15)</div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="user-input" placeholder="Ask for advice..." onkeypress="if(event.key==='Enter') sendMessage()" autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let currentStatus = { hunger: 10, budget: 100, health: 10, done: false };

        async function api(path, reqBody = null) {
            const options = { method: reqBody ? 'POST' : 'GET', headers: {'Content-Type': 'application/json'} };
            if (reqBody) options.body = JSON.stringify(reqBody);
            try {
                const res = await fetch(path, options);
                const json = await res.json();
                console.log("Raw Response", json);
                // Robust data finder
                return json.observation || json.data || json;
            } catch (e) { console.error("API error", e); return null; }
        }

        async function updateUI(obs) {
            if (!obs) return;
            currentStatus = obs;
            const hunger = obs.hunger ?? 0;
            const budget = obs.budget ?? 0;
            const health = obs.health ?? 0;

            document.getElementById('v-hunger').innerText = hunger;
            document.getElementById('b-hunger').style.width = (hunger * 10) + '%';
            document.getElementById('v-budget').innerText = `$${budget}`;
            document.getElementById('b-budget').style.width = (budget) + '%';
            document.getElementById('v-health').innerText = health;
            document.getElementById('b-health').style.width = (health * 10) + '%';

            if (obs.done) {
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('summary').innerText = `Budget: $${budget}, Health: ${health}`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;
            addBubble(msg, 'user');
            input.value = '';

            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg, state: currentStatus }) });
            const data = await res.json();
            const reply = data.reply || "Thinking...";
            addBubble(reply, 'bot');

            if (reply.includes('[ACTION: burger]')) await step('burger');
            else if (reply.includes('[ACTION: salad]')) await step('salad');
            else if (reply.includes('[ACTION: rice]')) await step('rice');
        }

        async function step(food) {
            const obs = await api('/step', { food }); 
            updateUI(obs);
        }

        async function handleAction(food) {
            addBubble(`Ordering ${food}...`, 'user');
            await step(food);
            addBubble(`Just applied the ${food} effects. Your hunger is down!`, 'bot');
        }

        async function init() {
            const obs = await api('/reset', {});
            updateUI(obs);
        }

        function addBubble(text, side) {
            const c = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = `bubble ${side}`;
            d.innerText = text.split('[ACTION:')[0].trim();
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        init();
    </script>
</body>
</html>
